schema_version: pre-cache-evals-v1

expected_batch_id: pre-cache-launch-universe-v1
expected_status_url: /api/admin/pre-cache/launch-universe

required_models:
  - PreCacheJobResponse
  - PreCacheBatchSummary
  - PreCacheBatchResponse

required_status_states:
  - succeeded
  - pending
  - running
  - failed
  - unsupported
  - unknown
  - unavailable

cached_generated_routes:
  AAPL: /assets/AAPL
  QQQ: /assets/QQQ
  VOO: /assets/VOO

status_cases:
  - id: status_cached_etf_voo
    lookup: status
    job_id: pre-cache-launch-voo
    expected_ticker: VOO
    expected_asset_type: etf
    expected_job_state: succeeded
    expected_worker_status: succeeded
    expected_generated_route: /assets/VOO
    expected_generated_output_available: true

  - id: status_cached_stock_aapl
    lookup: status
    job_id: pre-cache-launch-aapl
    expected_ticker: AAPL
    expected_asset_type: stock
    expected_job_state: succeeded
    expected_worker_status: succeeded
    expected_generated_route: /assets/AAPL
    expected_generated_output_available: true

  - id: status_queued_eligible_etf_spy
    lookup: status
    job_id: pre-cache-launch-spy
    expected_ticker: SPY
    expected_asset_type: etf
    expected_job_state: pending
    expected_worker_status: queued
    expected_generated_route: null
    expected_generated_output_available: false

