source_policy_required_exclusions:
  - rejected_source
  - non_allowlisted_source
  - metadata_only
  - link_only
  - duplicate
  - promotional
  - irrelevant
  - wrong_asset
analysis_required_section_order:
  - What Changed This Week
  - Market Context
  - Business/Fund Context
  - Risk Context
forbidden_analysis_language:
  - should buy
  - should sell
  - should hold
  - price target
  - guaranteed
  - will outperform
live_source_smoke_required_cases:
  - source_backed_official_first
  - limited_verified_set
  - empty_evidence
  - blocked_regression_tickers
live_source_smoke_blocked_regression_tickers:
  - TQQQ
  - ARKK
  - BND
  - GLD
  - BTC
  - ZZZZ
live_source_smoke_required_suppression_reasons:
  - duplicate
  - promotional
  - irrelevant
  - wrong_asset
  - outside_market_week_window
  - source_policy_blocked
  - rejected_source
  - non_allowlisted_source
  - license_disallowed
  - unrecognized_source
  - parser_invalid
  - rights_disallowed
  - hidden_internal
  - stale_unlabeled
live_source_smoke_required_selected_tiers:
  - official_filing
  - etf_issuer_announcement
  - allowlisted_news
