cases:
  - id: search_supported_ticker_voo
    query: VOO
    expected_state: supported
    expected_result_tickers: [VOO]
    expected_support_classifications: [cached_supported]
    expected_can_open_generated_page: true
    expected_requires_ingestion: false
    expected_can_request_ingestion: false

  - id: search_supported_name_aapl
    query: Apple
    expected_state: supported
    expected_result_tickers: [AAPL]
    expected_support_classifications: [cached_supported]
    expected_can_open_generated_page: true
    expected_requires_ingestion: false
    expected_can_request_ingestion: false

  - id: search_ambiguous_sp500
    query: S&P 500 ETF
    expected_state: ambiguous
    expected_result_tickers: [VOO, SPY]
    expected_support_classifications: [cached_supported, eligible_not_cached]
    expected_requires_disambiguation: true
    expected_can_open_generated_page: false
    expected_can_request_ingestion: false

  - id: search_unsupported_crypto
    query: BTC
    expected_state: unsupported
    expected_result_tickers: [BTC]
    expected_support_classifications: [recognized_unsupported]
    expected_can_open_generated_page: false
    expected_can_request_ingestion: false

  - id: search_unsupported_leveraged_etf
    query: TQQQ
    expected_state: unsupported
    expected_result_tickers: [TQQQ]
    expected_support_classifications: [recognized_unsupported]
    expected_can_open_generated_page: false
    expected_can_request_ingestion: false

  - id: search_unsupported_inverse_etf
    query: SQQQ
    expected_state: unsupported
    expected_result_tickers: [SQQQ]
    expected_support_classifications: [recognized_unsupported]
    expected_can_open_generated_page: false
    expected_can_request_ingestion: false

  - id: search_unknown
    query: ZZZZ
    expected_state: unknown
    expected_result_tickers: [ZZZZ]
    expected_support_classifications: [unknown]
    expected_can_open_generated_page: false
    expected_can_request_ingestion: false

  - id: search_eligible_not_cached_spy
    query: SPY
    expected_state: ingestion_needed
    expected_result_tickers: [SPY]
    expected_support_classifications: [eligible_not_cached]
    expected_can_open_generated_page: false
    expected_requires_ingestion: true
    expected_can_request_ingestion: true
    expected_ingestion_request_route: /api/admin/ingest/SPY
