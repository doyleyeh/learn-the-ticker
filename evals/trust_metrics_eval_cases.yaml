  - question
  - answer
  - source_passage
  - source_url
  - email
  - ip_address
  - user_agent
  - account_id
  - portfolio
  - allocation
  - cookies
  - external_analytics_id
required_api_routes:
  - /api/trust-metrics/catalog
  - /api/trust-metrics/validate
forbidden_imports:
  - import requests
  - import httpx
  - urllib.request
  - from socket import
  - boto3
  - redis
  - psycopg
  - sqlalchemy
  - import analytics
  - from analytics
  - import segment
  - from segment
  - import amplitude
  - from amplitude
  - posthog
  - os.environ
  - api_key
