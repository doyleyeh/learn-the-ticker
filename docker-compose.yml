services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    command: npm --workspace apps/web run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app/apps/web
      - /app/node_modules
      - /app/apps/web/.next
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: sh -c "uvicorn backend.main:app --host 0.0.0.0 --port $${PORT:-8000}"
    environment:
      APP_ENV: local
      PORT: "8000"
      DATABASE_URL: postgresql://learn_the_ticker:learn_the_ticker@postgres:5432/learn_the_ticker
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      TOP500_UNIVERSE_MANIFEST_URI: data/universes/us_common_stocks_top500.current.json
      LLM_PROVIDER: mock
      LLM_LIVE_GENERATION_ENABLED: "false"
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: learn-the-ticker-local
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
      - minio

  ingestion-worker:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    profiles:
      - worker
    command:
      - python
      - -c
      - print("ingestion worker scaffold - no live ingestion is started by docker compose")
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://learn_the_ticker:learn_the_ticker@postgres:5432/learn_the_ticker
      TOP500_UNIVERSE_MANIFEST_URI: data/universes/us_common_stocks_top500.current.json
      LLM_PROVIDER: mock
      LLM_LIVE_GENERATION_ENABLED: "false"
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: learn_the_ticker
      POSTGRES_USER: learn_the_ticker
      POSTGRES_PASSWORD: learn_the_ticker
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: learn_the_ticker
      MINIO_ROOT_PASSWORD: learn_the_ticker_dev_only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
